name: Deploy to shinyapps.io

on:
  push:
    branches:
      - master
jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:

      - uses: actions/checkout@v3
      - name: Deploy Shiny App
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'   
          
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libmagick++-dev \
            python3-pip \
            python3-venv
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: rsconnect, remotes, reticulate, rstudio/keras3

      - name: Install Keras
        shell: Rscript {0}
        run: |
           reticulate::install_python()
           keras3::install_keras()
           
      - name: Authorize shinyapps.io
        run: |
          Rscript -e 'rsconnect::setAccountInfo(name="${{ secrets.SHINYUSERNAME }}", token="${{ secrets.SHINYTOKEN }}", secret="${{ secrets.SHINYSECRET }}")'
      - name: Deploy
        run: |
          Rscript -e 'rsconnect::deployApp(appName="FruitRecognition",forceUpdate = TRUE)'
