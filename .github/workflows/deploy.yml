name: Deploy to shinyapps.io

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest   # or ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install rsconnect
        run: install.packages("rsconnect", repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Authorize shinyapps.io
        run: |
          rsconnect::setAccountInfo(
            name = "${{ secrets.SHINYUSERNAME }}",
            token = "${{ secrets.SHINYTOKEN }}",
            secret = "${{ secrets.SHINYSECRET }}"
          )
        shell: Rscript {0}

      - name: Deploy App
        run: |
          rsconnect::deployApp(
            appDir = ".",
            appName = "FruitRecognition",
            account = "${{ secrets.SHINYAPPS_ACCOUNT }}",
            launch.browser = FALSE
          )
        shell: Rscript {0}
