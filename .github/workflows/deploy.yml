name: Deploy to shinyapps.io

on:
  push:
    branches:
      - master
jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:

      - uses: actions/checkout@v3
      - name: Deploy Shiny App
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libmagick++-dev \
            python3-pip \
            python3-venv
      - name: Install R Packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      
        run: |
          install.packages(c("rsconnect", "remotes", "reticulate"))
          remotes::install_github("rstudio/keras3")
          # This installs the Python backend needed for the runner to 'see' Keras
          reticulate::install_python()
          keras3::install_keras()
        shell: Rscript {0}
          
      - name: Authorize shinyapps.io
        run: |
          Rscript -e 'rsconnect::setAccountInfo(name="${{ secrets.SHINYUSERNAME }}", token="${{ secrets.SHINYTOKEN }}", secret="${{ secrets.SHINYSECRET }}")'
      - name: Deploy
        run: |
          Rscript -e 'rsconnect::deployApp(appName="FruitRecognition",forceUpdate = TRUE)'
