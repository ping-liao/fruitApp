name: Deploy to shinyapps.io

on:
  push:
    branches:
      - master
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v3
      - name: Deploy Shiny App
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagick++-dev

      - name: Install R Packages
        run: |
          install.packages(c("rsconnect", "shiny", "magick", "keras3", "reticulate"))
        shell: Rscript {0}
      - name: Authorize shinyapps.io
        run: |
          Rscript -e 'rsconnect::setAccountInfo(name="${{ secrets.SHINYUSERNAME }}", token="${{ secrets.SHINYTOKEN }}", secret="${{ secrets.SHINYSECRET }}")'
      - name: Deploy
        run: |
          Rscript -e 'rsconnect::deployApp(appName="FruitRecognition")'
