name: Deploy to shinyapps.io
on:
  push:
    branches:
      - master
jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - name: Deploy Shiny App
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libmagick++-dev \
            python3-pip \
            python3-venv \
            libpython3-dev
      - name: Install Core R Packages
        run: |
          install.packages(c("reticulate", "rsconnect", "remotes"), repos="https://cloud.r-project.org")
        shell: Rscript {0}
      - name: Install Keras from GitHub
        run: |
          # Fresh R session starts here and will now see 'reticulate' and 'remotes'
          remotes::install_github("rstudio/keras3")
        shell: Rscript {0}
      - name: Initialize Keras and Python
        run: |
          # Another fresh session to finalize setup
          reticulate::install_python()
          keras3::install_keras(backend = "tensorflow")
        shell: Rscript {0}
      - name: Authorize shinyapps.io
        run: |
          Rscript -e "rsconnect::setAccountInfo(name='${{ secrets.SHINYUSERNAME }}', token='${{ secrets.SHINYTOKEN }}', secret='${{ secrets.SHINYSECRET }}')"

      - name: Deploy
        run: |
          Rscript -e "rsconnect::deployApp(appName='FruitRecognition', forceUpdate = TRUE)"
